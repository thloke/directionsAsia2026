<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ '/' | relative_url }}" class="topbar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1"/>
        <circle cx="12" cy="12" r="5"  stroke="currentColor" stroke-width="0.75" stroke-dasharray="2 2"/>
        <line x1="12" y1="2"  x2="12" y2="22" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
        <line x1="2"  y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
        <line x1="4.9" y1="4.9" x2="19.1" y2="19.1" stroke="currentColor" stroke-width="0.6" opacity="0.35"/>
        <line x1="19.1" y1="4.9" x2="4.9" y2="19.1" stroke="currentColor" stroke-width="0.6" opacity="0.35"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
      <span>{{ site.title }}</span>
    </a>
    <span class="topbar-event">{{ site.tagline }}</span>
  </header>

  <div class="page-wrapper">
    <nav class="sidebar" aria-label="Workshop navigation">
      <div class="sidebar-section">
        <p class="sidebar-heading">The Path</p>
        <a href="{{ '/' | relative_url }}"
           class="sidebar-link{% if page.url == '/' %} active{% endif %}">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5v-3.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5V15H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 6.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146z"/>
          </svg>
          The Sanctum
        </a>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-heading">The Rites</p>
        {% for stage in site.stages %}
        <a href="{{ stage.url | relative_url }}"
           class="sidebar-link{% if page.url == stage.url %} active{% endif %}">
          <span class="sidebar-stage-num">{{ stage.num }}</span>
          {{ stage.title }}
        </a>
        {% endfor %}
      </div>
    </nav>

    <main class="main-content" id="main-content">
      {{ content }}
    </main>
  </div>
</body>
</html>
